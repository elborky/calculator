<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <!-- T-180 / D-004: preload Inter-300 (display readout weight) — self-hosted, no CDN.
         crossorigin is required for font preloads even when same-origin. -->
    <link
      rel="preload"
      href="/src/ui/fonts/Inter-Light.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="app">
      <!-- fine grain/noise texture overlay (premium, not muddy) -->
      <div class="grain" aria-hidden="true"></div>

      <!-- flex row reserves M3 history slot beside the calculator -->
      <div class="app-layout">
        <!-- reserved M3 history slot (laid out, empty in M2 — F3) -->
        <div class="history-slot" aria-hidden="true"></div>

        <!-- THE GLASS SLAB -->
        <main class="calc" role="application" aria-label="Calculator">
          <!-- reserved M4 theme-toggle corner (empty in M2 — F4) -->
          <div class="toggle-slot" aria-hidden="true"></div>

          <!-- DISPLAY — live region; dark scrim guarantees AA contrast (UR-023) -->
          <div class="display" role="status" aria-live="polite" aria-label="Calculator display">
            <!-- pending expression line: hidden in fresh state, space reserved -->
            <div class="pending-line" aria-hidden="true" hidden></div>
            <!-- primary readout: fresh state shows 0 -->
            <div class="readout">0</div>
          </div>

          <!-- KEYPAD — 4-col, exact §3 cell layout, true Unicode glyphs -->
          <div class="keypad" role="group" aria-label="Calculator keypad">
            <!-- row 1: AC  CE  ÷  × -->
            <button type="button" class="key key--util" data-action="all-clear" aria-label="All clear">AC</button>
            <button type="button" class="key key--util" data-action="clear-entry" aria-label="Clear entry">CE</button>
            <button type="button" class="key key--op" data-op="divide" aria-label="Divide">&#247;</button>
            <button type="button" class="key key--op" data-op="multiply" aria-label="Multiply">&#215;</button>

            <!-- row 2: 7 8 9 − -->
            <button type="button" class="key" data-digit="7" aria-label="7">7</button>
            <button type="button" class="key" data-digit="8" aria-label="8">8</button>
            <button type="button" class="key" data-digit="9" aria-label="9">9</button>
            <button type="button" class="key key--op" data-op="subtract" aria-label="Subtract">&#8722;</button>

            <!-- row 3: 4 5 6 + -->
            <button type="button" class="key" data-digit="4" aria-label="4">4</button>
            <button type="button" class="key" data-digit="5" aria-label="5">5</button>
            <button type="button" class="key" data-digit="6" aria-label="6">6</button>
            <button type="button" class="key key--op" data-op="add" aria-label="Add">&#43;</button>

            <!-- row 4: 1 2 3  | = (spans rows 4-5, col 4) -->
            <button type="button" class="key" data-digit="1" aria-label="1">1</button>
            <button type="button" class="key" data-digit="2" aria-label="2">2</button>
            <button type="button" class="key" data-digit="3" aria-label="3">3</button>
            <button type="button" class="key key--equals" data-action="equals" aria-label="Equals">&#61;</button>

            <!-- row 5: 0 (spans cols 1-2)  . -->
            <button type="button" class="key key--zero" data-digit="0" aria-label="0">0</button>
            <button type="button" class="key" data-action="decimal" aria-label="Decimal point">.</button>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/ui/main.ts"></script>
  </body>
</html>
