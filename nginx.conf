# Calculator — NGINX server block for the Dokploy Dockerfile build.
# Serves the Vite static bundle on port 80; Traefik (Dokploy) terminates TLS
# in front via Let's Encrypt. Headers below are from storm/ship/01-security-audit.md (F-7).
#
# NGINX add_header gotcha: add_header directives are inherited into a `location`
# ONLY if that location defines NO add_header of its own. Several locations below
# set Cache-Control, which would otherwise CANCEL inheritance of the security
# headers. So the security headers live in /etc/nginx/security-headers.conf and are
# `include`d in every location (and at server level for any unmatched response).

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Server-level (applies to responses not matched by a location with its own add_header).
    include /etc/nginx/security-headers.conf;

    # ---- gzip ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/manifest+json;
    # woff2 is already compressed — not in gzip_types on purpose.

    # ---- Cache-control ----
    # Vite emits content-hashed assets under /assets/ (JS, CSS, the woff2 font) —
    # immutable, safe to cache forever.
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        try_files  $uri =404;
    }

    # index.html must never be cached stale — it points at the hashed asset names.
    location = /index.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # ---- SPA fallback ----
    # Single-page app: unknown routes fall back to index.html (the app is one page,
    # but this keeps any deep-link / refresh from 404-ing).
    location / {
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Don't serve dotfiles.
    location ~ /\. {
        deny all;
    }
}
