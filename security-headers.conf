# Security headers — included into every location of the calculator server block.
# Source: storm/ship/01-security-audit.md (F-7). Lives in its own file because NGINX
# add_header is NOT inherited into any location that defines its own add_header
# (e.g. the Cache-Control locations) — `include`ing it everywhere restores them.
#
# CSP: script-src 'self' with NO unsafe-inline / unsafe-eval (the bundle has no inline
#   JS and no eval). style-src includes 'unsafe-inline' per the audit's settled value
#   (belt-and-suspenders for the runtime CSSOM font-fit writes in render.ts + CSS custom
#   props). font-src 'self' = the self-hosted Inter woff2 (no CDN). img-src adds data:
#   for the inline `data:,` favicon. object-src / base-uri / frame-ancestors locked.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

# HSTS is intentionally NOT set here. Enable it ONLY after a custom-domain Let's Encrypt
# cert is confirmed live (Traefik), to avoid locking users out over a non-HTTPS or
# misconfigured-cert host. See README "HSTS — enable after HTTPS confirmed".
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
