<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — Light Theme v1 Conservative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
     * LIGHT THEME TOKEN OVERRIDE — v1 CONSERVATIVE
     * Bright sibling of v3 aurora dark. Gentle calm aurora.
     * ============================================================ */
    :root {
      /* Accent system — indigo + coral-rose, darkened for AA on light */
      --accent:                    #5b3de8;
      --accent-glow:               rgba(91, 61, 232, 0.35);
      --accent-dark:               #4a2ec8;
      --accent-hover-from:         #6a4df5;
      --accent-hover-to:           #5030d0;
      --operator-accent:           #e8285a;
      --operator-accent-dark:      #cc1f4a;
      --operator-accent-hover-from:#f03868;
      --operator-accent-hover-to:  #d42050;
      --operator-glow:             rgba(232, 40, 90, 0.30);
      --text-on-accent:            #ffffff;
      --error:                     #c0122a;

      /* RGB triplets */
      --accent-rgb:           91, 61, 232;
      --operator-accent-rgb:  232, 40, 90;
      --scrim-rgb:            240, 238, 255;
      --calc-fallback-rgb:    230, 228, 255;
      --op-shadow-rgb:        160, 0, 40;
      --eq-shadow-rgb:        30, 10, 120;

      /* Text — dark on light glass for WCAG AA */
      --text-on-scrim:        #1a1040;
      --text-on-scrim-soft:   rgba(26, 16, 64, 0.60);
      --text-primary:         #1a1040;
      --text-secondary:       rgba(26, 16, 64, 0.55);

      /* Glass — white translucent */
      --glass-fill:          rgba(255, 255, 255, 0.52);
      --glass-fill-hover:    rgba(255, 255, 255, 0.68);
      --glass-fill-display:  rgba(255, 255, 255, 0.38);
      --glass-border:        rgba(255, 255, 255, 0.82);
      --glass-border-bright: rgba(255, 255, 255, 0.96);

      /* Display scrim — near-white tinted indigo */
      --display-scrim:       rgba(240, 238, 255, 0.85);

      /* Background — soft blue→violet→pink aurora */
      --bg-base:   #e8e4ff;
      --bg-aurora:
        radial-gradient(40% 50% at 20% 25%, rgba(167, 139, 250, 0.65) 0%, transparent 60%),
        radial-gradient(45% 55% at 80% 20%, rgba(244, 114, 182, 0.55) 0%, transparent 60%),
        radial-gradient(50% 60% at 75% 80%, rgba(96, 165, 250, 0.50) 0%, transparent 62%),
        radial-gradient(45% 50% at 25% 80%, rgba(168, 85, 247, 0.45) 0%, transparent 60%),
        linear-gradient(135deg, #ddd6fe 0%, #f3e8ff 50%, #fce7f3 100%);
      --bg-blob:   radial-gradient(circle, rgba(232, 40, 90, 0.25) 0%, rgba(91, 61, 232, 0.20) 45%, transparent 70%);

      /* Motion tokens — unchanged */
      --motion-press:          80ms ease-out;
      --motion-hover-bg:      120ms ease;
      --motion-hover-shadow:  150ms ease;
      --motion-result-rise:   200ms ease-out;
      --glass-glow-hover:     rgba(91, 61, 232, 0.08);

      /* Glass-recipe structural */
      --radius-body:    30px;
      --radius-display: 22px;
      --radius-btn:     18px;
      --blur-body:      22px;
      --blur-display:   16px;
      --blur-key:       10px;
    }

    /* ============================================================
     * RESET + BASE
     * ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-color: var(--bg-base);
      background-image: var(--bg-aurora);
      background-attachment: fixed;
    }

    /* Transition for theme swap */
    *, *::before, *::after {
      transition:
        background 300ms ease,
        background-color 300ms ease,
        color 300ms ease,
        border-color 300ms ease,
        box-shadow 300ms ease;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }
    }

    /* ============================================================
     * LAYOUT WRAPPER — side-by-side history + calculator
     * ============================================================ */
    .app-layout {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
      max-width: 620px;
    }

    @media (max-width: 620px) {
      .app-layout {
        flex-direction: column;
        align-items: center;
        max-width: 360px;
      }
    }

    /* ============================================================
     * HISTORY TAPE
     * ============================================================ */
    .history-tape {
      width: 220px;
      flex-shrink: 0;
      background: var(--glass-fill);
      backdrop-filter: blur(var(--blur-body)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--blur-body)) saturate(140%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-body);
      box-shadow:
        0 8px 32px rgba(91, 61, 232, 0.10),
        0 2px 8px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 var(--glass-border-bright);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;

      /* @supports fallback */
      @supports not (backdrop-filter: blur(1px)) {
        background: rgba(var(--calc-fallback-rgb), 0.88);
      }
    }

    .history-tape-title {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .history-entry {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.30);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 12px;
    }

    .history-expression {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-result {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .history-divider {
      width: 100%;
      height: 1px;
      background: rgba(var(--accent-rgb), 0.12);
      margin: 4px 0;
    }

    @media (max-width: 620px) {
      .history-tape {
        width: 100%;
        max-width: 360px;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-radius: 20px;
        overflow-x: auto;
      }

      .history-tape-title {
        display: none;
      }

      .history-divider {
        display: none;
      }

      .history-entry {
        flex-shrink: 0;
        min-width: 100px;
      }
    }

    /* ============================================================
     * CALCULATOR BODY
     * ============================================================ */
    .calc {
      position: relative;
      width: 360px;
      flex-shrink: 0;
      background: var(--glass-fill);
      backdrop-filter: blur(var(--blur-body)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--blur-body)) saturate(140%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-body);
      box-shadow:
        0 16px 48px rgba(91, 61, 232, 0.12),
        0 4px 16px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 var(--glass-border-bright);
      padding: 20px;

      @supports not (backdrop-filter: blur(1px)) {
        background: rgba(var(--calc-fallback-rgb), 0.90);
      }
    }

    @media (max-width: 620px) {
      .calc {
        width: 100%;
        max-width: 360px;
      }
    }

    /* ============================================================
     * TOGGLE SLOT
     * ============================================================ */
    .toggle-slot {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      cursor: pointer;
      color: var(--text-primary);
      box-shadow:
        0 2px 8px rgba(91, 61, 232, 0.12),
        inset 0 1px 0 var(--glass-border-bright);
      transition: transform var(--motion-press), background var(--motion-hover-bg);
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.72);
    }

    .theme-toggle:active {
      transform: scale(0.92);
    }

    .theme-toggle:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    /* ============================================================
     * DISPLAY PANEL
     * ============================================================ */
    .display {
      background: var(--glass-fill-display);
      backdrop-filter: blur(var(--blur-display)) saturate(130%);
      -webkit-backdrop-filter: blur(var(--blur-display)) saturate(130%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-display);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 var(--glass-border-bright),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04);
      padding: 14px 18px 16px;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      margin-bottom: 16px;
      /* compensate for toggle slot */
      padding-right: 56px;
    }

    .display-expression {
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--text-on-scrim-soft);
      font-variant-numeric: tabular-nums;
      text-align: right;
      min-height: 18px;
      letter-spacing: 0.01em;
    }

    .display-readout {
      font-size: clamp(2rem, 10vw, 3.25rem);
      font-weight: 300;
      color: var(--text-on-scrim);
      font-variant-numeric: tabular-nums;
      text-align: right;
      line-height: 1.0;
      letter-spacing: -0.02em;
      /* Subtle text shadow for depth on light glass */
      text-shadow: 0 1px 3px rgba(var(--eq-shadow-rgb), 0.12);
    }

    /* ============================================================
     * KEYPAD GRID
     * ============================================================ */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* ---- Base button ---- */
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 68px;
      font-family: inherit;
      font-size: 1.375rem;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-btn);
      cursor: pointer;
      background: var(--glass-fill);
      color: var(--text-primary);
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 var(--glass-border-bright);
      transition:
        transform var(--motion-press),
        background var(--motion-hover-bg),
        box-shadow var(--motion-hover-shadow);
      -webkit-tap-highlight-color: transparent;
      user-select: none;

      @supports not (backdrop-filter: blur(1px)) {
        background: rgba(255, 255, 255, 0.80);
      }
    }

    .btn:hover {
      background: var(--glass-fill-hover);
      box-shadow:
        0 4px 16px rgba(var(--accent-rgb), 0.08),
        inset 0 1px 0 var(--glass-border-bright);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    /* ---- Utility keys: AC, CE ---- */
    .btn-utility {
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ---- Operator keys ---- */
    .btn-operator {
      background: linear-gradient(
        145deg,
        var(--operator-accent),
        var(--operator-accent-dark)
      );
      border-color: rgba(var(--operator-accent-rgb), 0.30);
      color: var(--text-on-accent);
      box-shadow:
        0 3px 12px rgba(var(--op-shadow-rgb), 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .btn-operator:hover {
      background: linear-gradient(
        145deg,
        var(--operator-accent-hover-from),
        var(--operator-accent-hover-to)
      );
      box-shadow:
        0 5px 20px rgba(var(--op-shadow-rgb), 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.30);
    }

    .btn-operator:focus-visible {
      outline-color: var(--operator-accent);
    }

    /* ---- Equals key ---- */
    .btn-equals {
      background: linear-gradient(
        145deg,
        var(--accent),
        var(--accent-dark)
      );
      border-color: rgba(var(--accent-rgb), 0.30);
      color: var(--text-on-accent);
      box-shadow:
        0 3px 12px rgba(var(--eq-shadow-rgb), 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      grid-row: span 2;
    }

    .btn-equals:hover {
      background: linear-gradient(
        145deg,
        var(--accent-hover-from),
        var(--accent-hover-to)
      );
      box-shadow:
        0 5px 20px rgba(var(--eq-shadow-rgb), 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .btn-equals:focus-visible {
      outline-color: var(--accent);
    }

    /* ---- Zero key (wide) ---- */
    .btn-zero {
      grid-column: span 2;
      justify-content: flex-start;
      padding-left: 26px;
    }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- ── HISTORY TAPE ── -->
    <aside class="history-tape" aria-label="Calculation history">
      <p class="history-tape-title">History</p>

      <div class="history-entry">
        <span class="history-expression">84 × 72</span>
        <span class="history-result">6,048</span>
      </div>

      <div class="history-divider"></div>

      <div class="history-entry">
        <span class="history-expression">9,999 ÷ 3</span>
        <span class="history-result">3,333</span>
      </div>

      <div class="history-divider"></div>

      <div class="history-entry">
        <span class="history-expression">750 + 484.56</span>
        <span class="history-result">1,234.56</span>
      </div>
    </aside>

    <!-- ── CALCULATOR ── -->
    <main class="calc" aria-label="Calculator">

      <!-- Toggle slot -->
      <div class="toggle-slot">
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Switch to dark theme"
          aria-pressed="true"
          title="Switch to dark theme"
        >
          <!-- Sun icon — light mode active -->
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="3.5"/>
            <line x1="10" y1="1.5" x2="10" y2="3"/>
            <line x1="10" y1="17" x2="10" y2="18.5"/>
            <line x1="1.5" y1="10" x2="3" y2="10"/>
            <line x1="17" y1="10" x2="18.5" y2="10"/>
            <line x1="4.22" y1="4.22" x2="5.28" y2="5.28"/>
            <line x1="14.72" y1="14.72" x2="15.78" y2="15.78"/>
            <line x1="15.78" y1="4.22" x2="14.72" y2="5.28"/>
            <line x1="5.28" y1="14.72" x2="4.22" y2="15.78"/>
          </svg>
        </button>
      </div>

      <!-- Display -->
      <div class="display" role="region" aria-label="Display" aria-live="polite">
        <div class="display-expression">750 + 484.56 =</div>
        <div class="display-readout">1,234.56</div>
      </div>

      <!-- Keypad -->
      <div class="keypad" role="group" aria-label="Calculator keypad">

        <!-- Row 1: AC  CE  ÷  × -->
        <button class="btn btn-utility" type="button" aria-label="All clear">AC</button>
        <button class="btn btn-utility" type="button" aria-label="Clear entry">CE</button>
        <button class="btn btn-operator" type="button" aria-label="Divide">÷</button>
        <button class="btn btn-operator" type="button" aria-label="Multiply">×</button>

        <!-- Row 2: 7  8  9  − -->
        <button class="btn" type="button" aria-label="7">7</button>
        <button class="btn" type="button" aria-label="8">8</button>
        <button class="btn" type="button" aria-label="9">9</button>
        <button class="btn btn-operator" type="button" aria-label="Subtract">−</button>

        <!-- Row 3: 4  5  6  + -->
        <button class="btn" type="button" aria-label="4">4</button>
        <button class="btn" type="button" aria-label="5">5</button>
        <button class="btn" type="button" aria-label="6">6</button>
        <button class="btn btn-operator" type="button" aria-label="Add">+</button>

        <!-- Row 4 + 5: 1  2  3  = (spans 2 rows) -->
        <button class="btn" type="button" aria-label="1">1</button>
        <button class="btn" type="button" aria-label="2">2</button>
        <button class="btn" type="button" aria-label="3">3</button>
        <button class="btn btn-equals" type="button" aria-label="Equals">=</button>

        <!-- Row 5: 0 (wide)  . -->
        <button class="btn btn-zero" type="button" aria-label="0">0</button>
        <button class="btn" type="button" aria-label="Decimal point">.</button>

      </div>
    </main>

  </div>
</body>
</html>
